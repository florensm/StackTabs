; StackTabs - High Contrast theme
; Dark theme with strong contrast for accessibility.
; Demonstrates: high-contrast colors, full active tab style.

[Theme]
Background=0D0D0D
TabBarBg=1A1A1A
TabActiveBg=00A4EF
TabActiveText=FFFFFF
TabInactiveBg=2D2D2D
TabInactiveBgHover=404040
TabInactiveText=FFFFFF
TabIndicatorColor=00A4EF
IconColor=FFFFFF
ContentBorder=505050
WindowText=FFFFFF

FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
IconFontSize=16

[Layout]
HeaderHeight=44
TabHeight=32
TabIndicatorHeight=4
ActiveTabStyle=full
TabBarAlignment=center
TabMaxLines=1
TabTitleAlignH=center
