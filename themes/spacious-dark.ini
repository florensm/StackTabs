; StackTabs - Spacious Dark theme
; Dark variant of spacious: tall tabs, generous padding, multi-line titles.
; Demonstrates: TabMaxLines=2, TabTitleAlignH=left, full layout.

[Theme]
Background=1A1A2E
TabBarBg=16162A
TabActiveBg=6C5CE7
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=2E2E4A
TabInactiveText=C5CDF0
TabIndicatorColor=6C5CE7
IconColor=7B8AB8
ContentBorder=35355A
WindowText=E0E8FF

FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=10
IconFontSize=14

[Layout]
HostPadding=0
HeaderHeight=42
TabHeight=36
TabGap=6
MinTabWidth=140
MaxTabWidth=280
CloseButtonWidth=26
PopoutButtonWidth=26
TabBarAlignment=center
TabIndicatorHeight=4
TabCornerRadius=10
ActiveTabStyle=full
TabMaxLines=2
TabTitleAlignH=left
