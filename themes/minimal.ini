; StackTabs - Minimal theme
; Clean dark theme with single-line centered titles, no indicator strip.
; Demonstrates: TabIndicatorHeight=0, ActiveTabStyle=full, minimal layout.

[Theme]
Background=1E1E2E
TabBarBg=18182A
TabActiveBg=45475A
TabActiveText=CDD6F4
TabInactiveBg=1E1E2E
TabInactiveBgHover=313244
TabInactiveText=89B4FA
TabIndicatorColor=89B4FA
IconColor=6C7086
ContentBorder=313244
WindowText=CDD6F4

FontName=Segoe UI
FontNameTab=Segoe UI
FontSize=9
IconFontSize=14

[Layout]
HostPadding=6
HeaderHeight=36
TabHeight=28
TabGap=4
TabIndicatorHeight=0
ActiveTabStyle=full
TabBarAlignment=center
TabMaxLines=1
TabTitleAlignH=center
TabTitleAlignV=center
