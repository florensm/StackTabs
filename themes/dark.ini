; StackTabs - Dark theme
; Deep purple dark background with indicator-only active tab style.
; Overrides config.ini [Layout] values — any key omitted here uses the config value.

[Theme]
; --- Colors (hex RGB, no #) ---
Background=1C1C2E
TabBarBg=13132A
TabActiveBg=7B6CF6
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=30304E
TabInactiveText=C5CDF0
TabIndicatorColor=7B6CF6
IconColor=6878B0
ContentBorder=35355A
WindowText=E0E8FF

; --- Fonts ---
FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
IconFontSize=16

[Layout]
TabIndicatorHeight=4
TabCornerRadius=8
ActiveTabStyle=indicator
TabBarAlignment=center
