; StackTabs - Dark (default + fallback)
; StackTabs.ahk falls back to this file if ThemeFile is missing — keep it in themes\.
; For every key the loader understands, see comments below (omit a key to use config.ini / built-in default).

[Theme]
; --- Colors (hex RGB, no #) ---
Background=1C1C2E
TabBarBg=13132A
TabActiveBg=7B6CF6
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=30304E
TabInactiveText=C5CDF0
TabIndicatorColor=7B6CF6
; TabIndicatorColor — optional; when omitted, defaults to TabActiveBg.
IconColor=6878B0
ContentBorder=35355A
WindowText=E0E8FF
; TabSeparatorColor — optional; color of vertical tab separators when TabSeparatorWidth>0 (see tmux.ini).

; --- Fonts ---
FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
; IconFont — optional; empty = auto (Segoe Fluent Icons / MDL2).
IconFontSize=16

[Layout]
; Only keys you set here override config.ini [Layout] for this theme.
;
; Spacing / chrome: HostPadding, HostPaddingBottom (-1 = same as HostPadding), HeaderHeight,
;   TabGap, MinTabWidth, MaxTabWidth, TabHeight, CloseButtonWidth, PopoutButtonWidth.
; Tab bar: TabBarAlignment (top|center|bottom), TabPosition (top|bottom),
;   TabIndicatorHeight (0 = off), TabCornerRadius, TabSeparatorWidth.
; Active tab look: ActiveTabStyle = full | indicator  (indicator = shared bg + accent strip).
; Titles: TabMaxLines (1|2), TabTitleMaxLen (omit or large = dynamic fit), TabTitleAlignH (left|center|right),
;   TabTitleAlignV (top|center; ignored when TabMaxLines>=2).
; Extras: ShowTabNumbers (0|1), ShowCloseButton (0|1), ShowPopoutButton (0|1).

TabIndicatorHeight=4
TabCornerRadius=8
ActiveTabStyle=indicator
TabBarAlignment=center
