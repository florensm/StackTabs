; StackTabs - Light theme
; Clean white/grey look with indicator-only active tab style.
; Overrides config.ini [Layout] values — any key omitted here uses the config value.

[Theme]
; --- Colors (hex RGB, no #) ---
Background=F3F3F3
TabBarBg=E8E8E8
TabActiveBg=0078D4
TabActiveText=FFFFFF
TabInactiveBg=E1E1E1
TabInactiveBgHover=D0D0D0
TabInactiveText=333333
TabIndicatorColor=0078D4
IconColor=666666
ContentBorder=CCCCCC
WindowText=333333

; --- Fonts ---
FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
IconFontSize=16

[Layout]
TabIndicatorHeight=4
ActiveTabStyle=indicator
TabBarAlignment=center
