; StackTabs - Spacious Light theme
; Tall tabs, generous padding, and a larger font for a relaxed feel.
; Overrides config.ini [Layout] values — any key omitted here uses the config value.

[Theme]
; --- Colors (hex RGB, no #) ---
Background=F8F8F8
TabBarBg=FFFFFF
TabActiveBg=0078D4
TabActiveText=FFFFFF
TabInactiveBg=E4E4E6
TabInactiveBgHover=D5D5D8
TabInactiveText=222222
; TabIndicatorColor defaults to TabActiveBg when omitted.
IconColor=888888
ContentBorder=C8C8CC
WindowText=1A1A1A

; --- Fonts ---
FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=10
IconFontSize=14

[Layout]
; Layout overrides — only include what differs from config.ini.
HostPadding=0
HeaderHeight=42
TabHeight=36
TabGap=6
MinTabWidth=140
MaxTabWidth=280
CloseButtonWidth=26
PopoutButtonWidth=26
TabBarAlignment=center
TabIndicatorHeight=4
TabCornerRadius=0
ActiveTabStyle=full

; --- Tab titles ---
TabMaxLines=2               ; 2 = word-wrap to second line.
TabTitleAlignH=left         ; left, center, right.
; TabTitleAlignV is ignored when TabMaxLines>=2 (always top).
