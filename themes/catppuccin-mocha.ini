; StackTabs - Catppuccin Mocha theme
; Copy this file to StackTabs.ini (replacing the existing one) to apply.

[General]
WindowTitleMatch=Ticket details
TargetExe=
RefreshInterval=200
CaptureDelayMs=900
TabDisappearGraceMs=300

[Layout]
HostTitle=StackTabs
HostWidth=1200
HostHeight=800
HostMinWidth=700
HostMinHeight=500
HostPadding=8
HeaderHeight=44
TabGap=6
MinTabWidth=120
MaxTabWidth=240
TabHeight=30
TabSlotMax=50
TabTitleMaxLen=60
CloseButtonWidth=22
PopoutButtonWidth=22
TabBarOffsetY=7
TabPosition=top
TabIndicatorHeight=3
UseCustomTitleBar=0
TitleBarHeight=28

[Theme]
Preset=custom
Background=1e1e2e
TabBarBg=181825
TabActiveBg=cba6f7
TabActiveText=1e1e2e
TabInactiveBg=313244
TabInactiveBgHover=45475a
TabInactiveText=cdd6f4
IconColor=6c7086
ContentBorder=313244
WindowText=cdd6f4
FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
FontSizeClose=10
IconFontSize=16

[TitleFilters]
