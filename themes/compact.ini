; StackTabs - Compact Dark theme
; Tight tabs and small buttons to maximise screen space.
; Top alignment for an efficient, space-saving feel.

[Theme]
Background=1C1C2E
TabBarBg=13132A
TabActiveBg=7B6CF6
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=30304E
TabInactiveText=C5CDF0
IconColor=6878B0
ContentBorder=35355A
WindowText=E0E8FF
FontName=Segoe UI
FontNameTab=Segoe UI
FontSize=8
IconFontSize=13

[Layout]
HostPadding=5
HeaderHeight=34
TabGap=3
