; StackTabs - Compact Dark theme
; Tight layout, small tabs, indicator-only style. Maximizes content area.
; Demonstrates: ActiveTabStyle=indicator, compact layout values.

[Theme]
Background=1C1C2E
TabBarBg=13132A
TabActiveBg=7B6CF6
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=30304E
TabInactiveText=C5CDF0
TabIndicatorColor=7B6CF6
IconColor=6878B0
ContentBorder=35355A
WindowText=E0E8FF

FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=8
IconFontSize=14

[Layout]
HostPadding=4
HeaderHeight=32
TabHeight=24
TabGap=4
MinTabWidth=80
MaxTabWidth=180
CloseButtonWidth=18
PopoutButtonWidth=18
TabIndicatorHeight=3
TabCornerRadius=3
ActiveTabStyle=indicator
TabBarAlignment=center
TabMaxLines=1
TabTitleAlignH=center
