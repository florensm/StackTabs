; StackTabs - Compact Dark theme
; Tight tabs and small buttons to maximise screen space.
; Based on the default dark palette.

[Theme]
Preset=custom
Background=1C1C2E
TabBarBg=13132A
TabActiveBg=7B6CF6
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=30304E
TabInactiveText=C5CDF0
IconColor=6878B0
ContentBorder=35355A
WindowText=E0E8FF
FontName=Segoe UI
FontNameTab=Segoe UI
FontSize=8
FontSizeClose=9
IconFontSize=13

[Layout]
HostPadding=5
HeaderHeight=34
TabGap=3
MinTabWidth=90
MaxTabWidth=200
TabHeight=24
CloseButtonWidth=18
PopoutButtonWidth=18
TabBarOffsetY=4
TabIndicatorHeight=2
