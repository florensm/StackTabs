; StackTabs - Bottom Tabs theme
; Light theme with tab bar at the bottom instead of top.
; Demonstrates: TabPosition=bottom, HostPaddingBottom for asymmetric padding.

[Theme]
Background=F5F5F5
TabBarBg=E5E5E5
TabActiveBg=0066CC
TabActiveText=FFFFFF
TabInactiveBg=D8D8D8
TabInactiveBgHover=C8C8C8
TabInactiveText=333333
TabIndicatorColor=0066CC
IconColor=555555
ContentBorder=CCCCCC
WindowText=222222

FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
IconFontSize=16

[Layout]
HostPadding=8
HostPaddingBottom=12
HeaderHeight=40
TabHeight=30
TabGap=6
TabPosition=bottom
TabIndicatorHeight=4
TabCornerRadius=6
ActiveTabStyle=indicator
TabBarAlignment=center
