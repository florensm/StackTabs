; StackTabs - One Dark theme (Atom/VSCode inspired)
; Copy this file to StackTabs.ini (replacing the existing one) to apply.

[General]
WindowTitleMatch=Ticket details
TargetExe=
RefreshInterval=200
CaptureDelayMs=900
TabDisappearGraceMs=300

[Layout]
HostTitle=StackTabs
HostWidth=1200
HostHeight=800
HostMinWidth=700
HostMinHeight=500
HostPadding=8
HeaderHeight=44
TabGap=6
MinTabWidth=120
MaxTabWidth=240
TabHeight=30
TabSlotMax=50
TabTitleMaxLen=60
CloseButtonWidth=22
PopoutButtonWidth=22
TabBarOffsetY=7
TabPosition=top
TabIndicatorHeight=3
UseCustomTitleBar=0
TitleBarHeight=28

[Theme]
Preset=custom
Background=282c34
TabBarBg=21252b
TabActiveBg=61afef
TabActiveText=282c34
TabInactiveBg=2c313c
TabInactiveBgHover=363b46
TabInactiveText=abb2bf
IconColor=5c6370
ContentBorder=3e4451
WindowText=abb2bf
FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
FontSizeClose=10
IconFontSize=16

[TitleFilters]
