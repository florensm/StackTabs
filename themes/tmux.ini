; StackTabs - Tmux theme
; Minimal light theme: white background, black text, monospace, full active style, tab numbers.

[Theme]
Background=FFFFFF
TabBarBg=F5F5F5
TabActiveBg=E8E8E8
TabActiveText=000000
TabInactiveBg=F5F5F5
TabInactiveBgHover=E0E0E0
TabInactiveText=333333
TabIndicatorColor=000000
IconColor=555555
ContentBorder=D0D0D0
WindowText=000000

FontName=Cascadia Code
FontNameTab=Cascadia Code
FontSize=8
IconFontSize=12

[Layout]
HostPadding=0
HostPaddingBottom=0
HeaderHeight=22
TabHeight=22
TabGap=0
TabIndicatorHeight=0
TabCornerRadius=0
ActiveTabStyle=full
TabBarAlignment=left
ShowTabNumbers=1
TabMaxLines=1
TabTitleAlignH=center
TabTitleAlignV=center
CloseButtonWidth=16
PopoutButtonWidth=16
