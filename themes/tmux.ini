; StackTabs - Tmux theme
; Status-bar style: bottom tabs, white background, black text, monospace, no close/popout buttons.

[Theme]
Background=FFFFFF
TabBarBg=FFFFFF
TabActiveBg=EEEEEE
TabActiveText=000000
TabInactiveBg=FFFFFF
TabInactiveBgHover=E8E8E8
TabInactiveText=333333
IconColor=555555
ContentBorder=D0D0D0
TabSeparatorColor=D0D0D0
WindowText=000000

FontName=Consolas
FontNameTab=Consolas
FontSize=10
IconFontSize=15

[Layout]
HostPadding=0
HostPaddingBottom=0
HeaderHeight=24
TabHeight=24
TabGap=0
TabIndicatorHeight=0
TabSeparatorWidth=1
TabCornerRadius=0
TabPosition=bottom
ActiveTabStyle=full
TabBarAlignment=left
ShowTabNumbers=1
TabMaxLines=1
TabTitleAlignH=left
TabTitleAlignV=center
ShowCloseButton=0
ShowPopoutButton=0
