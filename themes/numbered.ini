; StackTabs - Numbered theme
; Dark theme with tab position numbers (1. Title, 2. Title, ...).
; Demonstrates: ShowTabNumbers=1, useful for keyboard switching.

[Theme]
Background=1C1C2E
TabBarBg=13132A
TabActiveBg=7B6CF6
TabActiveText=FFFFFF
TabInactiveBg=252540
TabInactiveBgHover=30304E
TabInactiveText=C5CDF0
TabIndicatorColor=7B6CF6
IconColor=6878B0
ContentBorder=35355A
WindowText=E0E8FF

FontName=Segoe UI
FontNameTab=Segoe UI Semibold
FontSize=9
IconFontSize=16

[Layout]
TabIndicatorHeight=4
ActiveTabStyle=indicator
TabBarAlignment=center
ShowTabNumbers=1
TabMaxLines=1
TabTitleAlignH=left
